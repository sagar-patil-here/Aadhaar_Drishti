version: "3.9"

services:

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./ml:/app/ml
      - ./reports:/app/reports
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://drishti:drishti@db:5432/drishti_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A app.workers.batch_processor worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
      - ./ml:/app/ml
      - ./reports:/app/reports
    environment:
      DATABASE_URL: postgresql+asyncpg://drishti:drishti@db:5432/drishti_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  flower:
    build: .
    command: celery -A app.workers.batch_processor flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: drishti
      POSTGRES_PASSWORD: drishti
      POSTGRES_DB: drishti_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drishti"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
